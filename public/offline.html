<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Mirror — You're Offline</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #0A1628;
        color: #e2e8f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 1rem;
        text-align: center;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: #4A9EFF;
        margin-bottom: 1rem;
      }
      p {
        font-size: 1rem;
        color: #94a3b8;
        max-width: 360px;
        line-height: 1.6;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        background-color: #4A9EFF;
        color: #0A1628;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background-color: #60aeff;
      }
    </style>
  </head>
  <body>
    <h1>You're offline</h1>
    <p>Memory Mirror couldn't connect to the internet. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
  </body>
</html>

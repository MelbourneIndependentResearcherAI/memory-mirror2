name: Deploy Carer Hire AI to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-carer-hire-ai-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build and Deploy Carer Hire AI
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/carer-hire-ai/package-lock.json

      - name: Install dependencies
        working-directory: apps/carer-hire-ai
        run: npm ci

      - name: Build
        working-directory: apps/carer-hire-ai
        run: npm run build
        env:
          VITE_BASE44_APP_ID: ${{ secrets.VITE_BASE44_APP_ID }}
          VITE_BASE44_APP_BASE_URL: ${{ secrets.VITE_BASE44_APP_BASE_URL }}

      - name: Check deployment credentials
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ] || [ -z "${{ secrets.CARER_HIRE_AI_APP_NAME }}" ]; then
            echo "::error::AZURE_CREDENTIALS or CARER_HIRE_AI_APP_NAME secret is not set. See docs/azure-deployment.md for setup instructions."
            exit 1
          fi

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.CARER_HIRE_AI_APP_NAME }}
          package: apps/carer-hire-ai

      - name: Azure logout
        if: always()
        run: az logout

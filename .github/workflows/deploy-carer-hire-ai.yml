name: Deploy Carer Hire AI to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-carer-hire-ai-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build and Deploy Carer Hire AI
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/carer-hire-ai/package-lock.json

      - name: Install dependencies
        working-directory: apps/carer-hire-ai
        run: npm ci

      - name: Build
        working-directory: apps/carer-hire-ai
        run: npm run build
        env:
          VITE_BASE44_APP_ID: ${{ secrets.VITE_BASE44_APP_ID }}
          VITE_BASE44_APP_BASE_URL: ${{ secrets.VITE_BASE44_APP_BASE_URL }}

      - name: Check deployment credentials
        id: check_credentials
        run: |
          if [ -z "${{ secrets.CARER_HIRE_AI_PUBLISH_PROFILE }}" ] || [ -z "${{ secrets.CARER_HIRE_AI_APP_NAME }}" ]; then
            echo "::warning::CARER_HIRE_AI_PUBLISH_PROFILE or CARER_HIRE_AI_APP_NAME secret is not set. Skipping deployment. See docs/azure-deployment.md for setup instructions."
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Azure App Service
        if: steps.check_credentials.outputs.has_credentials == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.CARER_HIRE_AI_APP_NAME }}
          publish-profile: ${{ secrets.CARER_HIRE_AI_PUBLISH_PROFILE }}
          package: apps/carer-hire-ai
